<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 【修改 - 2026-03-21】base href 改为由 config.js 的 applyBaseHref() 动态设置 -->
    <!-- 支持通过 URL 参数 ?base=/xxx 或 localStorage feishu_config_app_base 灵活配置部署路径 -->
    <!-- 不再硬编码 /customer-app-h5/ -->
    <title>客户录入助手</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="nav-title">客户录入助手</div>
            <button id="logoutBtn" class="nav-btn" style="display: none;">退出</button>
        </nav>

        <!-- Main Content Container -->
        <main class="container" id="mainContent">
            <!-- Page content will be injected here -->
        </main>
    </div>

    <!-- Scripts -->
    <!-- 【修改 - 2026-03-21】config.js 必须在 auth.js 之前加载，因为 auth.js 依赖 CONFIG -->
    <script src="js/config.js"></script>
    <script>
        // 【修改 - 2026-03-21】动态设置 <base href>，支持多环境部署
        applyBaseHref();
    </script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components/nav.js"></script>
    <script src="js/components/customerList.js"></script>
    <script src="js/components/customerForm.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
