<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 客户录入助手</title>
    <link rel="stylesheet" href="/feishu-h5-app/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .login-container {
            width: 100%;
            max-width: 360px;
            padding: 20px;
        }
        
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        
        .login-logo {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .login-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px 24px;
            font-size: 16px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .login-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(51, 112, 255, 0.4);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .login-btn svg {
            width: 20px;
            height: 20px;
        }
        
        .login-footer {
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">📋</div>
            <h1 class="login-title">客户录入助手</h1>
            <p class="login-subtitle">使用飞书账号登录</p>
            
            <button class="login-btn" id="loginBtn" onclick="handleLogin()">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                飞书登录
            </button>
            
            <p class="login-footer">登录即表示同意相关服务条款和隐私政策</p>
        </div>
    </div>

    <!-- 【修改 - 2026-03-21】config.js 必须在 auth.js 之前加载 -->
    <script src="/feishu-h5-app/js/config.js"></script>
    <script>
        // 【修改 - 2026-03-21】动态设置 <base href>，支持多环境部署
        applyBaseHref();
    </script>
    <script src="/feishu-h5-app/js/auth.js"></script>
    <script>
        // 【修改 - 2026-03-21】登录成功跳转和已登录跳转改为使用 CONFIG.APP_BASE 动态生成
        // If already authenticated, redirect to main app
        if (Auth.isAuthenticated() && !Auth.isTokenExpired()) {
            window.location.href = CONFIG.APP_BASE.replace(/\/$/, '') + '/pages/customer_list.html';
        }

        function handleLogin() {
            Auth.login();
        }
    </script>
</body>
</html>
